<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guillotine Optimizer — раскладка</title>
<style>
  :root {
    --bg: #f4f2ee;
    --card: #ffffff;
    --line: #d9d4cc;
    --accent: #2f6f4f;
    --accent-dark: #245a40;
    --text: #1c1c1c;
    --muted: #6b6b6b;
    --danger: #b23b3b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.45;
  }
  header {
    background: var(--accent); color: #fff; padding: 16px 24px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header p { margin: 4px 0 0; opacity: .85; font-size: 13px; }
  .wrap {
    display: grid; grid-template-columns: 420px 1fr; gap: 20px;
    padding: 20px; align-items: start;
  }
  @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 18px;
  }
  .card h2 { margin: 0 0 14px; font-size: 15px; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  input[type=number] {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 6px; font-size: 14px; background: #fafafa;
  }
  input:focus { outline: none; border-color: var(--accent); background: #fff; }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  .field { margin-bottom: 14px; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  th { font-size: 11px; text-transform: uppercase; color: var(--muted);
    text-align: left; padding: 4px 6px; font-weight: 600; }
  td { padding: 3px 4px; }
  td input { padding: 6px 8px; font-size: 13px; }
  .del-btn {
    background: none; border: none; color: var(--danger);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px;
  }
  .btn {
    border: none; border-radius: 6px; padding: 10px 16px;
    font-size: 14px; cursor: pointer; font-weight: 600;
  }
  .btn-add { background: #eef0ee; color: var(--accent-dark); margin-top: 8px; }
  .btn-run {
    background: var(--accent); color: #fff; width: 100%;
    margin-top: 16px; padding: 13px; font-size: 15px;
  }
  .btn-run:disabled { opacity: .6; cursor: progress; }
  .btn:hover { filter: brightness(.97); }
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .stat {
    background: #f0efe9; border-radius: 8px; padding: 10px 16px; min-width: 110px;
  }
  .stat .num { font-size: 22px; font-weight: 700; }
  .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; }
  .stat.ok .num { color: var(--accent); }
  .stat.bad .num { color: var(--danger); }
  #result img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; }
  .placeholder { color: var(--muted); text-align: center; padding: 60px 20px; }
  .unplaced-list { margin: 0; padding-left: 0; list-style: none; }
  .unplaced-list li {
    display: inline-block; background: #fbe9e7; color: var(--danger);
    border: 1px solid #f0c9c4; border-radius: 6px;
    padding: 4px 10px; margin: 0 6px 6px 0; font-size: 13px;
  }
  .msg { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 14px; }
  .msg.error { background: #fbe9e7; color: var(--danger); border: 1px solid #f0c9c4; }
  .spinner {
    display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
    border-top-color: transparent; border-radius: 50%;
    animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>📐 Guillotine Optimizer</h1>
  <p>Раскладка деталей на листе. Все размеры в миллиметрах.</p>
</header>

<div class="wrap">
  <!-- ── ФОРМА ──────────────────────────────────────────── -->
  <div class="card">
    <h2>Параметры</h2>

    <div class="field">
      <label>Размер листа (Ш × В, мм)</label>
      <div class="row">
        <div><input type="number" id="page_w" value="743" min="1"></div>
        <div><input type="number" id="page_h" value="580" min="1"></div>
      </div>
    </div>

    <div class="field">
      <label>Лимит времени поиска (сек)</label>
      <input type="number" id="timeout" value="15" min="1" max="300">
    </div>

    <div class="field">
      <label title="Дополнительный перебор, чтобы впихнуть детали, не влезшие в основном поиске. 0 — пропустить (быстрый ответ).">
        Доп. поиск нераскроенных (сек) <span style="cursor:help;">ⓘ</span>
      </label>
      <input type="number" id="goal_driven" value="0" min="0" max="300">
    </div>

    <h2 style="margin-top:20px;">Изделия</h2>
    <table>
      <thead>
        <tr><th>Ширина</th><th>Высота</th><th>Кол-во</th><th></th></tr>
      </thead>
      <tbody id="parts"></tbody>
    </table>
    <button class="btn btn-add" onclick="addRow()">+ Добавить изделие</button>

    <button class="btn btn-run" id="runBtn" onclick="runOptimize()">Запустить</button>
  </div>

  <!-- ── РЕЗУЛЬТАТ ──────────────────────────────────────── -->
  <div class="card">
    <h2>Результат</h2>
    <div id="result">
      <div class="placeholder">Заполни параметры и нажми «Запустить».</div>
    </div>
  </div>
</div>

<script>
// начальные изделия для удобства
const DEFAULT_PARTS = [
  [152, 92, 4], [122, 92, 12], [92, 52, 11], [72, 102, 6], [62, 62, 10],
];

function addRow(w = "", h = "", c = "") {
  const tbody = document.getElementById("parts");
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><input type="number" class="p-w" value="${w}" min="1" placeholder="мм"></td>
    <td><input type="number" class="p-h" value="${h}" min="1" placeholder="мм"></td>
    <td><input type="number" class="p-c" value="${c}" min="1" placeholder="шт"></td>
    <td><button class="del-btn" title="Удалить" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);
}

DEFAULT_PARTS.forEach(p => addRow(...p));

function collectParts() {
  const parts = [];
  document.querySelectorAll("#parts tr").forEach(tr => {
    const w = tr.querySelector(".p-w").value;
    const h = tr.querySelector(".p-h").value;
    const c = tr.querySelector(".p-c").value;
    if (w && h && c) parts.push({ width: +w, height: +h, count: +c });
  });
  return parts;
}

async function runOptimize() {
  const btn = document.getElementById("runBtn");
  const res = document.getElementById("result");
  const payload = {
    page_width: +document.getElementById("page_w").value,
    page_height: +document.getElementById("page_h").value,
    timeout: +document.getElementById("timeout").value,
    goal_driven: +document.getElementById("goal_driven").value,
    parts: collectParts(),
  };
  if (!payload.parts.length) {
    res.innerHTML = '<div class="msg error">Добавь хотя бы одно изделие.</div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Идёт раскладка…';
  res.innerHTML = '<div class="placeholder"><span class="spinner" style="border-color:#2f6f4f;border-top-color:transparent;"></span><br>Оптимизатор работает, подожди…</div>';

  try {
    const r = await fetch("/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) {
      res.innerHTML = `<div class="msg error">${data.error || "Ошибка сервера"}</div>`;
      return;
    }
    renderResult(data);
  } catch (e) {
    res.innerHTML = `<div class="msg error">Сбой запроса: ${e}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "Запустить";
  }
}

function renderResult(d) {
  const res = document.getElementById("result");
  let html = "";

  if (d.warning) html += `<div class="msg error">${d.warning}</div>`;

  const allPlaced = d.unplaced_total === 0;
  html += `<div class="stats">
    <div class="stat ${allPlaced ? "ok" : ""}">
      <div class="num">${d.placed_count} / ${d.total_requested}</div>
      <div class="lbl">Размещено деталей</div>
    </div>
    <div class="stat ok">
      <div class="num">${d.efficiency}%</div>
      <div class="lbl">Заполнение</div>
    </div>
    <div class="stat ${allPlaced ? "ok" : "bad"}">
      <div class="num">${d.unplaced_total}</div>
      <div class="lbl">Не раскроено</div>
    </div>
    <div class="stat">
      <div class="num">${d.elapsed}с</div>
      <div class="lbl">Время</div>
    </div>
  </div>`;

  if (d.unplaced && d.unplaced.length) {
    html += `<p style="font-size:13px;color:var(--muted);margin:0 0 6px;">Нераскроенные детали:</p><ul class="unplaced-list">`;
    d.unplaced.forEach(u => {
      html += `<li>${u.width}×${u.height} мм — ${u.count} шт</li>`;
    });
    html += `</ul>`;
  } else {
    html += `<p style="color:var(--accent);font-weight:600;font-size:14px;">✓ Все детали раскроены.</p>`;
  }

  if (d.image) {
    html += `<div style="margin-top:14px;"><img src="${d.image}?t=${Date.now()}" alt="Схема раскладки"></div>`;
  }

  res.innerHTML = html;
}
</script>
</body>
</html>
